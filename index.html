<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título de la página -->
    <title>Feria El Baratillo - Interactiva</title>

    <!-- Conexión con el archivo CSS -->
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <!-- Encabezado con Canvas Animado -->
    <header>
        <canvas id="logoCanvas" width="400" height="80"></canvas>
        <p class="subtitulo">¡Los mejores productos a precios de feria!</p>
    </header>

    <!-- Contenedor principal -->
    <main class="contenedor">

        <!-- Sección de productos -->
        <section class="productos">

            <!-- Categoría Electrónicos -->
            <div class="categoria">
                <h2>⚡ Electrónicos</h2>

                <div class="lista-productos">

                    <button class="btn-producto"
                        onclick="mostrarDetalle('USB', '$5', 'Memoria de 64GB de alta velocidad.')">
                        USB
                    </button>

                    <button class="btn-producto"
                        onclick="mostrarDetalle('Chip Celular', '$3', 'Conectividad 4G/5G con saldo inicial.')">
                        Chip Celular
                    </button>

                    <button class="btn-producto"
                        onclick="mostrarDetalle('Cargador', '$10', 'Carga rápida de 20W tipo C.')">
                        Cargador Celular
                    </button>

                </div>
            </div>

            <!-- Categoría Doméstico -->
            <div class="categoria">
                <h2>🏠 Doméstico</h2>

                <div class="lista-productos">

                    <button class="btn-producto"
                        onclick="mostrarDetalle('Cocina Portátil', '$25', 'Ideal para camping, funciona con gas butano.')">
                        Cocina Portátil
                    </button>

                    <button class="btn-producto"
                        onclick="mostrarDetalle('Cuchillos', '$8', 'Set de 3 cuchillos de acero inoxidable.')">
                        Cuchillos
                    </button>

                    <button class="btn-producto"
                        onclick="mostrarDetalle('Encendedor', '$2', 'Recargable y resistente al viento.')">
                        Encendedor
                    </button>

                    <!-- Producto agregado -->
                    <button class="btn-producto"
                        onclick="mostrarDetalle('Sartén Antiadherente', '$15', 'Ideal para cocina moderna y fácil limpieza.')">
                        Sartén
                    </button>

                </div>
            </div>

        </section>

        <!-- Panel de información -->
        <aside class="panel-info">

            <h3>Información del Producto</h3>

            <div id="vista-previa">
                <p>Haz clic en cualquier producto para ver sus detalles aquí.</p>
            </div>

        </aside>

    </main>

    <!-- Conexión con JavaScript -->
    <script src="script.js"></script>

</body>
</html>
